[appearance]
spacing = "compact"

[appearance.themes]
system_theme = false
theme = "light"

[appearance.vertical_tabs]
enabled = true
display_granularity = "tabs"
tab_item_mode = "focused_session"

[appearance.text]
notebook_font_size = 14.0
font_size = 13.0
font_name = "JetBrains Mono"
ai_font_name = "JetBrains Mono"
match_ai_font = false

[appearance.blocks]
should_show_in_band_command_blocks = false

[appearance.icon]
app_icon = "classic_2"

[appearance.window]
open_windows_at_custom_size = false

[appearance.input]
input_mode = "pinned_to_bottom"

[appearance.panes]
should_dim_inactive_panes = false

[appearance.tabs]
show_indicators_button = true
tab_close_button_position = "right"

[general]
default_session_mode = "agent"
new_tab_placement = "after_current_tab"

[agents]

[agents.third_party]
should_render_cli_agent_toolbar = true

[agents.warp_agent]
is_any_ai_enabled = true

[agents.warp_agent.other]
show_agent_notifications = true
show_conversation_history = true

[code]

[code.editor]
show_code_review_button = true
show_project_explorer = true
show_global_search = true

[warp_drive]
enabled = false

[terminal]
osc52_clipboard_access = "read_write"

[terminal.input]
alias_expansion_enabled = true
input_box_type_setting = "universal"
honor_ps1 = false
completions_open_while_typing = false

[terminal.input.extra_meta_keys]
left_alt = true
right_alt = false

[notifications]
toast_duration_secs = 4

[notifications.preferences]
is_agent_task_completed_enabled = true
is_long_running_enabled = true
is_needs_attention_enabled = true
is_password_prompt_enabled = true
long_running_threshold = 30
mode = "disabled"
play_notification_sound = true

[keys]
ctrl_tab_behavior_setting = "activate_prev_next_tab"
